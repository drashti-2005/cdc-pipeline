# CDC Pipeline Kubernetes Deployment (Staging)
---
apiVersion: v1
kind: Namespace
metadata:
  name: cdc-staging
  labels:
    app.kubernetes.io/name: cdc-pipeline
    environment: staging

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cdc-pipeline-config
  namespace: cdc-staging
  labels:
    app.kubernetes.io/name: cdc-pipeline
data:
  CDC_LOG_LEVEL: "INFO"
  CDC_LOG_FORMAT: "json"
  KAFKA_TOPIC_PREFIX: "cdc.source.public"
  KAFKA_NUM_PARTITIONS: "3"
  BATCH_SIZE: "1000"
  POLL_INTERVAL_SECONDS: "1"

---
apiVersion: v1
kind: Secret
metadata:
  name: cdc-pipeline-secrets
  namespace: cdc-staging
  labels:
    app.kubernetes.io/name: cdc-pipeline
type: Opaque
stringData:
  SOURCE_DB_HOST: "postgres-source.cdc-staging.svc.cluster.local"
  SOURCE_DB_PORT: "5432"
  SOURCE_DB_USER: "cdc_user"
  SOURCE_DB_PASSWORD: "changeme-in-production"
  SOURCE_DB_NAME: "source_db"
  TARGET_DB_HOST: "postgres-target.cdc-staging.svc.cluster.local"
  TARGET_DB_PORT: "5432"
  TARGET_DB_USER: "cdc_user"
  TARGET_DB_PASSWORD: "changeme-in-production"
  TARGET_DB_NAME: "target_db"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.cdc-staging.svc.cluster.local:9092"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdc-pipeline
  namespace: cdc-staging
  labels:
    app.kubernetes.io/name: cdc-pipeline
    app.kubernetes.io/component: pipeline
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cdc-pipeline
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cdc-pipeline
        app.kubernetes.io/component: pipeline
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cdc-pipeline
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
        - name: cdc-pipeline
          image: ghcr.io/your-org/cdc-pipeline:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          envFrom:
            - configMapRef:
                name: cdc-pipeline-config
            - secretRef:
                name: cdc-pipeline-secrets
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
      
      volumes:
        - name: config-volume
          configMap:
            name: cdc-pipeline-config
        - name: logs
          emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: cdc-pipeline
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: cdc-pipeline
  namespace: cdc-staging
  labels:
    app.kubernetes.io/name: cdc-pipeline
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: cdc-pipeline

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cdc-pipeline
  namespace: cdc-staging
  labels:
    app.kubernetes.io/name: cdc-pipeline

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cdc-pipeline
  namespace: cdc-staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cdc-pipeline
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cdc-pipeline
  namespace: cdc-staging
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cdc-pipeline

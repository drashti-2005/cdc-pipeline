# ============================================================
# CDC Pipeline - Docker Compose Configuration
# ============================================================
# This file defines ALL infrastructure services for the CDC pipeline.
# Start with: docker compose -f docker/docker-compose.yml --env-file .env up -d
# ============================================================

services:

  # ============================================================
  # SOURCE LAYER - The database we capture changes FROM
  # ============================================================
  postgres-source:
    image: postgres:16-alpine
    container_name: postgres-source
    environment:
      # Database credentials - read from .env file
      POSTGRES_DB: ${SOURCE_PG_DB}
      POSTGRES_USER: ${SOURCE_PG_USER}
      POSTGRES_PASSWORD: ${SOURCE_PG_PASSWORD}
      # Use md5 for password auth (scram-sha-256 causes issues with some drivers)
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      # host_port:container_port
      # Access from your machine at localhost:5432
      - "${SOURCE_PG_PORT}:5432"
    volumes:
      # Named volume for data persistence (survives container restarts)
      - postgres_source_data:/var/lib/postgresql/data
      # Init script runs on FIRST startup only (when volume is fresh)
      - ./postgres-source/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # CRITICAL: These commands enable logical replication (CDC requirement)
    # Without these, PostgreSQL won't expose WAL changes for our pipeline
    command:
      - "postgres"
      - "-c" 
      - "wal_level=logical"              # Enable logical decoding of WAL
      - "-c"
      - "max_replication_slots=4"        # Max number of replication slots
      - "-c"
      - "max_wal_senders=4"              # Max number of WAL sender processes
      - "-c"
      - "log_statement=all"              # Log all SQL (useful for debugging)
    healthcheck:
      # Docker runs this command to check if PostgreSQL is ready
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_PG_USER} -d ${SOURCE_PG_DB}"]
      interval: 5s        # Check every 5 seconds
      timeout: 5s         # Wait max 5 seconds for response
      retries: 5          # Mark unhealthy after 5 failed attempts
      start_period: 10s   # Give PostgreSQL 10s to start before checking
    networks:
      - cdc-network
    restart: unless-stopped

  # ============================================================
  # TARGET LAYER - The database we replicate changes TO
  # ============================================================
  postgres-target:
    image: postgres:16-alpine
    container_name: postgres-target
    environment:
      POSTGRES_DB: ${TARGET_PG_DB}
      POSTGRES_USER: ${TARGET_PG_USER}
      POSTGRES_PASSWORD: ${TARGET_PG_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      # Different host port (5433) to avoid conflict with source (5432)
      - "${TARGET_PG_PORT}:5432"
    volumes:
      - postgres_target_data:/var/lib/postgresql/data
      # Init script creates same schema as source (but no CDC config)
      - ./postgres-target/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TARGET_PG_USER} -d ${TARGET_PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cdc-network
    restart: unless-stopped

  # ============================================================
  # STREAMING LAYER - Kafka (KRaft mode, no Zookeeper needed)
  # ============================================================

  # Kafka: The event streaming platform (heart of our pipeline)
  # Using KRaft mode (Kafka Raft) - modern Kafka without Zookeeper dependency.
  # KRaft replaced Zookeeper as Kafka's metadata manager since Kafka 3.3+.
  # All CDC events flow through Kafka topics.
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    environment:
      # --- KRaft Configuration (replaces Zookeeper) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- Listener Configuration ---
      # INTERNAL = container-to-container (other Docker services use this)
      # EXTERNAL = host machine access (your Python scripts, tools)
      # CONTROLLER = KRaft internal communication
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- Topic Defaults ---
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # --- Retention ---
      KAFKA_LOG_RETENTION_MS: 604800000
      KAFKA_MESSAGE_MAX_BYTES: 10485760

      # --- KRaft cluster ID ---
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"     # External access from host
      - "29092:29092"   # Internal access from other containers
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cdc-network
    restart: unless-stopped

  # ============================================================
  # STORAGE LAYER - MinIO (S3-compatible object storage)
  # ============================================================
  
  # MinIO: Our "data lake" for archiving raw CDC events (Bronze layer)
  # It's like having AWS S3 running on your machine.
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      # Root credentials for MinIO admin access
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"    # API port (S3-compatible endpoint)
      - "9001:9001"    # Console port (Web UI)
    volumes:
      - minio_data:/data
    # Start MinIO server with console on port 9001
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cdc-network
    restart: unless-stopped

  # ============================================================
  # MONITORING LAYER - Prometheus + Grafana
  # ============================================================

  # Prometheus: Collects metrics from all our services
  # It "scrapes" (pulls) metrics from endpoints every few seconds
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      # Mount our Prometheus config file
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Mount alerting rules
      - ../monitoring/alerting:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'    # Keep metrics for 7 days
      - '--web.enable-lifecycle'               # Enable reload via HTTP
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cdc-network
    restart: unless-stopped

  # Grafana: Visualizes metrics from Prometheus as beautiful dashboards
  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    environment:
      # Admin credentials
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Allow embedding in iframes (useful for integration)
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Auto-provision Prometheus as a data source
      GF_DATASOURCES_DEFAULT_NAME: Prometheus
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      # Auto-provision dashboards and data sources
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cdc-network
    restart: unless-stopped

  # ============================================================
  # ORCHESTRATION LAYER - Apache Airflow
  # ============================================================
  
  # Airflow: Workflow orchestration (schedules dbt runs, monitors pipeline)
  # Using standalone mode for simplicity (webserver + scheduler in one)
  airflow:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow
    environment:
      # --- Core Settings ---
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      
      # --- Database (use PostgreSQL target for Airflow metadata) ---
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_password@airflow-db:5432/airflow_db
      
      # --- Webserver ---
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: "cdc-pipeline-secret-key-change-in-prod"
      
      # --- API ---
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      
      # --- Connection to target PostgreSQL for dbt ---
      TARGET_PG_HOST: postgres-target
      TARGET_PG_PORT: 5432
      TARGET_PG_DB: ${TARGET_PG_DB}
      TARGET_PG_USER: ${TARGET_PG_USER}
      TARGET_PG_PASSWORD: ${TARGET_PG_PASSWORD}
      
      # --- dbt path ---
      DBT_PROFILES_DIR: /opt/dbt
    volumes:
      - ../airflow/dags:/opt/airflow/dags:ro
      - ../airflow/plugins:/opt/airflow/plugins:ro
      - ../dbt:/opt/dbt:ro
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
      postgres-target:
        condition: service_healthy
    command: >
      bash -c "
        pip install dbt-postgres --quiet &&
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        airflow scheduler &
        airflow webserver
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - cdc-network
    restart: unless-stopped

  # Airflow metadata database (separate from target to keep things clean)
  airflow-db:
    image: postgres:16-alpine
    container_name: airflow-db
    environment:
      POSTGRES_DB: airflow_db
      POSTGRES_USER: airflow_user
      POSTGRES_PASSWORD: airflow_password
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow_user -d airflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cdc-network
    restart: unless-stopped

# ============================================================
# NETWORKS - How containers communicate
# ============================================================
networks:
  cdc-network:
    driver: bridge    # Default Docker network driver
    name: cdc-network

# ============================================================
# VOLUMES - Persistent data storage
# ============================================================
# Named volumes ensure data survives container restarts.
# Use `docker compose down -v` to destroy them (clean slate).
volumes:
  postgres_source_data:
    name: cdc_postgres_source_data
  postgres_target_data:
    name: cdc_postgres_target_data
  kafka_data:
    name: cdc_kafka_data
  minio_data:
    name: cdc_minio_data
  prometheus_data:
    name: cdc_prometheus_data
  grafana_data:
    name: cdc_grafana_data
  airflow_logs:
    name: cdc_airflow_logs
  airflow_db_data:
    name: cdc_airflow_db_data

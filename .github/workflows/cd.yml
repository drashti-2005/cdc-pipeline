# Continuous Deployment Pipeline
# Deploys to staging/production environments

name: CD Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================================================
  # Build and Push Docker Image
  # =============================================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # =============================================================================
  # Deploy to Staging
  # =============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.cdc-pipeline.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config
        if: ${{ secrets.STAGING_KUBECONFIG != '' }}
      
      - name: Deploy to Kubernetes (staging)
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ${{ needs.build-and-push.outputs.image_tag }}"
          
          # Apply Kubernetes manifests
          if [ -d "deploy/k8s/staging" ]; then
            kubectl apply -f deploy/k8s/staging/
            kubectl set image deployment/cdc-pipeline \
              cdc-pipeline=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image_digest }} \
              -n cdc-staging || true
          else
            echo "No Kubernetes manifests found - skipping deployment"
          fi
        continue-on-error: true
      
      - name: Verify deployment
        run: |
          echo "Verifying staging deployment..."
          # kubectl rollout status deployment/cdc-pipeline -n cdc-staging --timeout=300s
        continue-on-error: true
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging..."
          # curl -f https://staging.cdc-pipeline.example.com/health || exit 1
        continue-on-error: true

  # =============================================================================
  # Deploy to Production
  # =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://cdc-pipeline.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > ~/.kube/config
        if: ${{ secrets.PRODUCTION_KUBECONFIG != '' }}
      
      - name: Create deployment backup
        run: |
          echo "Creating backup of current production deployment..."
          # kubectl get deployment cdc-pipeline -n cdc-production -o yaml > backup.yaml
        continue-on-error: true
      
      - name: Deploy to Kubernetes (production)
        run: |
          echo "Deploying to production environment..."
          echo "Image: ${{ needs.build-and-push.outputs.image_tag }}"
          
          # Apply Kubernetes manifests
          if [ -d "deploy/k8s/production" ]; then
            kubectl apply -f deploy/k8s/production/
            kubectl set image deployment/cdc-pipeline \
              cdc-pipeline=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image_digest }} \
              -n cdc-production || true
          else
            echo "No Kubernetes manifests found - skipping deployment"
          fi
        continue-on-error: true
      
      - name: Verify deployment
        run: |
          echo "Verifying production deployment..."
          # kubectl rollout status deployment/cdc-pipeline -n cdc-production --timeout=300s
        continue-on-error: true
      
      - name: Run production smoke tests
        run: |
          echo "Running smoke tests on production..."
          # curl -f https://cdc-pipeline.example.com/health || exit 1
        continue-on-error: true
      
      - name: Notify deployment success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '✅ Successfully deployed to production!'
            })

  # =============================================================================
  # Rollback (manual trigger only)
  # =============================================================================
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'rollback'
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > ~/.kube/config
        if: ${{ secrets.PRODUCTION_KUBECONFIG != '' }}
      
      - name: Rollback deployment
        run: |
          echo "Rolling back production deployment..."
          # kubectl rollout undo deployment/cdc-pipeline -n cdc-production
        continue-on-error: true
      
      - name: Verify rollback
        run: |
          echo "Verifying rollback..."
          # kubectl rollout status deployment/cdc-pipeline -n cdc-production --timeout=300s
        continue-on-error: true

# ============================================================
# Grafana Data Source Provisioning
# ============================================================
# This file auto-configures Prometheus as a data source in Grafana.
# No need to manually add it through the Grafana UI.
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'

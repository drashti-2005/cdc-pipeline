# ============================================================
# Grafana Dashboard Provisioning
# ============================================================
# This tells Grafana where to find dashboard JSON files.
# Dashboards are loaded automatically on startup.
# ============================================================

apiVersion: 1

providers:
  - name: 'CDC Pipeline Dashboards'
    orgId: 1
    folder: 'CDC Pipeline'
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

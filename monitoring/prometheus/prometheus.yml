# ============================================================
# Prometheus Configuration
# ============================================================
# Prometheus scrapes (pulls) metrics from targets at regular intervals.
# Each target exposes a /metrics endpoint that Prometheus reads.
# ============================================================

global:
  # How often Prometheus collects metrics from all targets
  scrape_interval: 15s
  # How often to evaluate alerting rules
  evaluation_interval: 15s

# ============================================================
# Alerting Rules
# ============================================================
rule_files:
  - /etc/prometheus/alerts/*.yml

# ============================================================
# Alertmanager Configuration (optional)
# ============================================================
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# ============================================================
# Scrape Targets - Services that expose metrics
# ============================================================
scrape_configs:
  # Prometheus monitors itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # CDC Pipeline Consumer metrics
  - job_name: 'cdc-pipeline'
    static_configs:
      # host.docker.internal allows Docker containers to reach host machine
      - targets: ['host.docker.internal:8000']
    scrape_interval: 10s
    # Honor the timestamps from the application
    honor_timestamps: true
    # Labels to add to all scraped metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: cdc-consumer

  # PostgreSQL Source metrics (optional - via pg_exporter in later phases)
  # - job_name: 'postgres-source'
  #   static_configs:
  #     - targets: ['postgres-exporter-source:9187']

  # Kafka metrics (optional - via JMX exporter in later phases)
  # - job_name: 'kafka'
  #   static_configs:
  #     - targets: ['kafka:7071']

[pytest]
# ============================================================
# Pytest Configuration
# ============================================================

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    unit: Fast unit tests (no external dependencies)
    integration: Integration tests (require Docker services)
    e2e: End-to-end tests (full pipeline)
    slow: Slow tests (skip with -m "not slow")

# Default options
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Async mode for pytest-asyncio
asyncio_mode = auto

# Logging during tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# Coverage settings (when running with pytest-cov)
# Run with: pytest --cov=src --cov-report=html

# Timeout for tests (requires pytest-timeout)
timeout = 60

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# ============================================================
# Staging Models Documentation & Tests
# ============================================================

version: 2

models:
  - name: stg_customers
    description: "Cleaned customer data with normalized fields and derived attributes"
    columns:
      - name: customer_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: email
        description: "Lowercase, trimmed email address"
        tests: [unique, not_null]
      - name: full_name
        description: "Concatenated first and last name"
      - name: is_valid_record
        description: "Data quality flag"

  - name: stg_products
    description: "Product catalog with price tiers and stock status"
    columns:
      - name: product_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: price_tier
        description: "Price category (budget/mid-range/premium/luxury)"
        tests:
          - accepted_values:
              values: ['budget', 'mid-range', 'premium', 'luxury']
      - name: stock_status
        description: "Inventory status"
        tests:
          - accepted_values:
              values: ['out_of_stock', 'low_stock', 'normal', 'high_stock']

  - name: stg_orders
    description: "Orders with status categories and time dimensions"
    columns:
      - name: order_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: customer_id
        description: "Foreign key to customers"
        tests: [not_null]
      - name: status_category
        description: "Simplified status grouping"
        tests:
          - accepted_values:
              values: ['open', 'in_transit', 'completed', 'cancelled', 'unknown']

  - name: stg_order_items
    description: "Line items with pre-calculated totals"
    columns:
      - name: order_item_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: line_total
        description: "quantity * unit_price"
